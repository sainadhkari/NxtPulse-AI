kind = "web"
previewPath = "/"
title = "NxtPulse AI"
version = "1.0.0"
id = "artifacts/nxtpulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20537

[services.development]
run = "pnpm --filter @workspace/nxtpulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nxtpulse", "run", "build" ]
publicDir = "artifacts/nxtpulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20537"
BASE_PATH = "/"
